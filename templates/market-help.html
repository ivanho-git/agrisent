<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎤 Market Help — AGRI-SENTINEL</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#059669">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --emerald-900: #064e3b;
            --emerald-700: #047857;
            --emerald-600: #059669;
            --emerald-500: #10b981;
            --emerald-400: #34d399;
            --emerald-300: #6ee7b7;
            --emerald-200: #a7f3d0;
            --emerald-100: #d1fae5;
            --emerald-50: #ecfdf5;
            --red-500: #ef4444;
            --slate-900: #0f172a;
            --slate-700: #334155;
            --slate-500: #64748b;
            --slate-400: #94a3b8;
            --slate-300: #cbd5e1;
            --slate-200: #e2e8f0;
            --slate-100: #f1f5f9;
            --slate-50: #f8fafc;
            --r: 12px;
            --r-lg: 16px;
            --r-xl: 24px;
            --r-full: 9999px;
        }

        body {
            font-family: 'Outfit', system-ui, sans-serif;
            color: var(--slate-900);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            position: relative;
            background: url('https://images.unsplash.com/photo-1595822533038-f9448e9c6de2?q=80&w=2000&auto=format&fit=crop') center/cover no-repeat fixed
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg, rgba(241, 245, 249, .88), rgba(236, 253, 245, .85), rgba(241, 245, 249, .88));
            z-index: 0;
            pointer-events: none
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        @keyframes pulse-ring {
            0% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, .4)
            }

            100% {
                box-shadow: 0 0 0 20px rgba(239, 68, 68, 0)
            }
        }

        @keyframes bounce-dot {

            0%,
            80%,
            100% {
                transform: scale(0)
            }

            40% {
                transform: scale(1)
            }
        }

        .topbar {
            background: linear-gradient(135deg, #022c22, var(--emerald-900));
            padding: 0 20px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 2px 12px rgba(0, 0, 0, .15);
            border-bottom: none;
            position: relative;
            z-index: 10
        }

        .topbar-logo {
            color: #fff;
            font-size: 17px;
            font-weight: 800;
            letter-spacing: -.3px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .topbar-logo .dot {
            width: 7px;
            height: 7px;
            background: var(--emerald-400);
            border-radius: 50%;
            animation: pulse-ring 2s infinite
        }

        .topbar-nav {
            display: flex;
            gap: 6px
        }

        .topbar-nav a,
        .topbar-nav button {
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            padding: 9px 16px;
            border-radius: var(--r-full);
            border: 1.5px solid rgba(255, 255, 255, .2);
            background: rgba(255, 255, 255, .1);
            color: rgba(255, 255, 255, .9);
            text-decoration: none;
            cursor: pointer;
            transition: .2s;
            display: flex;
            align-items: center;
            gap: 5px;
            min-height: 40px;
            backdrop-filter: blur(4px)
        }

        .topbar-nav a:hover,
        .topbar-nav button:hover {
            background: rgba(255, 255, 255, .2);
            border-color: rgba(255, 255, 255, .35)
        }

        .topbar-nav .active {
            background: rgba(255, 255, 255, .25);
            color: #fff;
            border-color: rgba(255, 255, 255, .4);
            box-shadow: 0 2px 8px rgba(0, 0, 0, .1)
        }

        .topbar-nav .logout {
            border-color: rgba(252, 165, 165, .4);
            color: #fca5a5;
            background: rgba(239, 68, 68, .15)
        }

        .topbar-nav .logout:hover {
            background: rgba(239, 68, 68, .3);
            color: #fff
        }

        .lang-strip {
            background: #fff;
            border-bottom: 1.5px solid var(--slate-200);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
            box-shadow: 0 1px 3px rgba(0, 0, 0, .04)
        }

        .lang-strip label {
            font-size: 12px;
            font-weight: 700;
            color: var(--slate-700);
            text-transform: uppercase;
            letter-spacing: .8px
        }

        .lang-strip select {
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            padding: 8px 14px;
            border: 1.5px solid var(--slate-300);
            border-radius: 10px;
            background: var(--slate-50);
            color: var(--slate-900);
            outline: none;
            cursor: pointer;
            min-height: 40px
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            max-width: 740px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            z-index: 1
        }

        .chat-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            -webkit-overflow-scrolling: touch
        }

        .welcome {
            background: #fff;
            border: 1.5px solid var(--slate-200);
            border-radius: var(--r-xl);
            padding: 32px 28px;
            text-align: center;
            animation: fadeIn .5s ease;
            position: relative;
            overflow: hidden;
            z-index: 1;
            box-shadow: 0 4px 12px rgba(0, 0, 0, .06)
        }

        .welcome::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--emerald-500), #f59e0b, var(--emerald-400))
        }

        .welcome .icon-row {
            font-size: 42px;
            margin-bottom: 14px;
            letter-spacing: 6px
        }

        .welcome h2 {
            font-size: 22px;
            font-weight: 800;
            color: var(--slate-900);
            margin-bottom: 10px
        }

        .welcome p {
            font-size: 15px;
            color: var(--slate-600);
            line-height: 1.7;
            margin-bottom: 20px
        }

        .welcome p strong {
            color: var(--emerald-700);
            font-weight: 700
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px
        }

        .chip {
            font-family: inherit;
            padding: 12px 20px;
            background: var(--emerald-50);
            border: 1.5px solid var(--emerald-200);
            border-radius: var(--r-full);
            font-size: 14px;
            font-weight: 600;
            color: var(--emerald-800);
            cursor: pointer;
            transition: .2s
        }

        .chip:hover {
            border-color: var(--emerald-400);
            color: #fff;
            background: var(--emerald-600);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, .2)
        }

        .chip:active {
            transform: scale(.97)
        }

        .msg {
            max-width: 84%;
            animation: fadeIn .3s ease both;
            display: flex;
            flex-direction: column;
            gap: 3px
        }

        .msg.user {
            align-self: flex-end
        }

        .msg.bot {
            align-self: flex-start
        }

        .bubble {
            padding: 14px 18px;
            border-radius: var(--r-lg);
            font-size: 15px;
            line-height: 1.65;
            word-wrap: break-word
        }

        .msg.user .bubble {
            background: linear-gradient(135deg, #022c22, var(--emerald-700));
            color: #fff;
            border-bottom-right-radius: 4px;
            box-shadow: 0 3px 10px rgba(6, 78, 59, .2)
        }

        .msg.bot .bubble {
            background: #fff;
            color: var(--slate-900);
            border: 1px solid var(--slate-200);
            border-left: 3px solid var(--emerald-400);
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, .03)
        }

        .msg-time {
            font-size: 11px;
            color: var(--slate-400);
            padding: 0 6px
        }

        .msg.user .msg-time {
            text-align: right
        }

        .transcript-tag {
            font-size: 12px;
            color: var(--slate-500);
            font-style: italic;
            background: var(--emerald-50);
            padding: 5px 14px;
            border-radius: 8px;
            margin-bottom: 4px;
            border: 1px solid var(--emerald-200)
        }

        .play-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            padding: 8px 18px;
            background: var(--emerald-50);
            border: 1px solid var(--emerald-200);
            color: var(--emerald-700);
            border-radius: var(--r-full);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: .2s
        }

        .play-btn:hover,
        .play-btn.playing {
            background: var(--emerald-600);
            color: #fff;
            border-color: var(--emerald-600)
        }

        .typing {
            align-self: flex-start;
            display: none;
            padding: 0 16px 8px;
            animation: fadeIn .2s ease
        }

        .typing.show {
            display: block
        }

        .typing-inner {
            background: #fff;
            border: 1px solid var(--slate-200);
            border-radius: var(--r-lg);
            border-bottom-left-radius: 4px;
            padding: 14px 22px;
            display: inline-flex;
            gap: 6px;
            box-shadow: 0 2px 4px rgba(0, 0, 0, .02)
        }

        .typing-inner span {
            width: 7px;
            height: 7px;
            background: var(--emerald-400);
            border-radius: 50%;
            display: block
        }

        .typing-inner span:nth-child(1) {
            animation: bounce-dot 1.4s infinite ease-in-out -.32s
        }

        .typing-inner span:nth-child(2) {
            animation: bounce-dot 1.4s infinite ease-in-out -.16s
        }

        .typing-inner span:nth-child(3) {
            animation: bounce-dot 1.4s infinite ease-in-out
        }

        .input-bar {
            flex-shrink: 0;
            background: #fff;
            border-top: 1.5px solid var(--slate-200);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 -4px 12px rgba(0, 0, 0, .05);
            position: relative;
            z-index: 1
        }

        .input-bar input {
            flex: 1;
            font-family: inherit;
            font-size: 16px;
            padding: 14px 20px;
            border: 1.5px solid var(--slate-300);
            border-radius: var(--r-full);
            background: var(--slate-50);
            color: var(--slate-900);
            outline: none;
            transition: .2s;
            font-weight: 500
        }

        .input-bar input:focus {
            border-color: var(--emerald-500);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, .12);
            background: #fff
        }

        .input-bar input::placeholder {
            color: var(--slate-400);
            font-weight: 400
        }

        .btn-send {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--emerald-700), var(--emerald-500));
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: .2s;
            flex-shrink: 0;
            box-shadow: 0 3px 10px rgba(16, 185, 129, .25)
        }

        .btn-send:hover {
            background: linear-gradient(135deg, var(--emerald-900), var(--emerald-600));
            transform: scale(1.05);
            box-shadow: 0 5px 16px rgba(16, 185, 129, .3)
        }

        .btn-send:disabled {
            background: var(--slate-300);
            cursor: not-allowed;
            transform: none;
            box-shadow: none
        }

        .btn-mic {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            border: 2.5px solid var(--emerald-500);
            background: var(--emerald-50);
            color: var(--emerald-700);
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: .2s;
            flex-shrink: 0
        }

        .btn-mic:hover {
            background: var(--emerald-600);
            color: #fff;
            border-color: var(--emerald-600);
            box-shadow: 0 3px 10px rgba(16, 185, 129, .2)
        }

        .btn-mic.recording {
            background: var(--red-500);
            border-color: var(--red-500);
            color: #fff;
            animation: pulse-ring 1.5s infinite
        }

        .btn-mic:disabled {
            opacity: .35;
            cursor: not-allowed;
            animation: none
        }

        @media(max-width:768px) {
            .topbar {
                height: 56px;
                padding: 0 12px
            }

            .topbar-logo {
                font-size: 15px
            }

            .topbar-nav {
                gap: 4px;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none;
                -ms-overflow-style: none;
                flex-shrink: 1;
                min-width: 0
            }

            .topbar-nav::-webkit-scrollbar {
                display: none
            }

            .topbar-nav a,
            .topbar-nav button {
                font-size: 13px;
                padding: 8px 14px;
                min-height: 40px;
                white-space: nowrap;
                flex-shrink: 0
            }

            .lang-strip {
                padding: 8px 12px
            }

            .lang-strip label {
                font-size: 11px
            }

            .lang-strip select {
                font-size: 14px;
                padding: 6px 10px;
                min-height: 36px
            }

            .chat-scroll {
                padding: 14px 12px;
                gap: 12px
            }

            .welcome {
                padding: 24px 18px
            }

            .welcome .icon-row {
                font-size: 34px
            }

            .welcome h2 {
                font-size: 19px
            }

            .welcome p {
                font-size: 14px
            }

            .msg {
                max-width: 90%
            }

            .bubble {
                padding: 12px 14px;
                font-size: 14px
            }

            .input-bar {
                padding: 10px 12px
            }

            .input-bar input {
                padding: 14px 18px;
                font-size: 16px
            }

            .btn-send {
                width: 50px;
                height: 50px;
                font-size: 20px
            }

            .btn-mic {
                width: 54px;
                height: 54px;
                font-size: 24px
            }

            .chip {
                padding: 12px 18px;
                font-size: 14px
            }

            .chips {
                gap: 8px
            }
        }

        @media(max-width:420px) {

            .topbar-nav a,
            .topbar-nav button {
                font-size: 12px;
                padding: 7px 10px;
                min-height: 38px
            }

            .topbar-logo {
                font-size: 13px
            }

            .chips {
                flex-direction: column;
                align-items: stretch
            }

            .chip {
                text-align: center
            }
        }
    </style>
</head>

<body>
    <header class="topbar">
        <a href="/dashboard" class="topbar-logo">🌱 AGRI-SENTINEL <span class="dot"></span></a>
        <nav class="topbar-nav">
            <a href="/scan">🔬 Scan</a>
            <a href="/dashboard">🏠</a>
            <a href="/history">📊 History</a>
            <a href="/market-help" class="active">🎤 Market</a>
            <button class="logout" onclick="logout()">🚪</button>
        </nav>
    </header>
    <div class="lang-strip">
        <label>🌐 Language</label>
        <select id="langSelect">
            <option value="hi-IN">🇮🇳 हिंदी</option>
            <option value="en-IN">🇬🇧 English</option>
            <option value="ta-IN">தமிழ்</option>
            <option value="te-IN">తెలుగు</option>
            <option value="kn-IN">ಕನ್ನಡ</option>
            <option value="ml-IN">മലയാളം</option>
            <option value="mr-IN">मराठी</option>
            <option value="gu-IN">ગુજરાતી</option>
            <option value="bn-IN">বাংলা</option>
            <option value="pa-IN">ਪੰਜਾਬੀ</option>
            <option value="od-IN">ଓଡ଼ିଆ</option>
        </select>
    </div>
    <div class="chat-container">
        <div class="chat-scroll" id="chatScroll">
            <div class="welcome">
                <div class="icon-row">🙏 🌾 🎤</div>
                <h2>Namaste, {{ profile.farmer_name if profile else 'Farmer' }} ji!</h2>
                <p>Ask about <strong>crop prices</strong>, <strong>mandis</strong>, <strong>market trends</strong>, or
                    <strong>selling tips</strong>.<br>Type below or tap 🎤 to speak!
                </p>
                <div class="chips">
                    <button class="chip" onclick="ask(this.textContent)">आज प्याज का भाव?</button>
                    <button class="chip" onclick="ask(this.textContent)">Tomato price today</button>
                    <button class="chip" onclick="ask(this.textContent)">गेहूं कहां बेचूं?</button>
                    <button class="chip" onclick="ask(this.textContent)">Best mandi near me</button>
                </div>
            </div>
        </div>
        <div class="typing" id="typing">
            <div class="typing-inner"><span></span><span></span><span></span></div>
        </div>
        <div class="input-bar">
            <input type="text" id="inp" placeholder="Type your question…" autocomplete="off" enterkeyhint="send">
            <button class="btn-send" id="sendBtn" onclick="sendText()" title="Send">➤</button>
            <button class="btn-mic" id="micBtn" onclick="toggleMic()" title="Tap to speak">🎤</button>
        </div>
    </div>
    <script>
        const scroll = document.getElementById('chatScroll'), inp = document.getElementById('inp'), sendBtn = document.getElementById('sendBtn'), micBtn = document.getElementById('micBtn'), typing = document.getElementById('typing');
        let busy = false, recording = false, recorder = null, chunks = [], curAudio = null;
        const lang = () => document.getElementById('langSelect').value;
        const tm = () => new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
        const bot = () => requestAnimationFrame(() => scroll.scrollTop = scroll.scrollHeight);
        function addMsg(h, role, pre = '') { const d = document.createElement('div'); d.className = 'msg ' + role; d.innerHTML = `${pre}<div class="bubble">${h}</div><div class="msg-time">${role === 'user' ? '🧑‍🌾' : '🤖'} ${tm()}</div>`; scroll.appendChild(d); bot(); return d }
        function addPlay(m, b64) { if (!b64) return; const b = document.createElement('button'); b.className = 'play-btn'; b.innerHTML = '🔊 Listen'; b.onclick = () => play(b64, b); m.querySelector('.bubble').append(document.createElement('br'), b) }
        function play(b64, btn) { if (curAudio) { curAudio.pause(); curAudio = null } try { const a = new Audio('data:audio/wav;base64,' + b64); curAudio = a; if (btn) btn.classList.add('playing'); a.onended = a.onerror = () => { if (btn) btn.classList.remove('playing'); curAudio = null }; a.play().catch(() => { if (btn) btn.classList.remove('playing') }) } catch (e) { } }
        function lock(on) { busy = on; sendBtn.disabled = micBtn.disabled = inp.disabled = on; typing.classList.toggle('show', on); bot() }
        async function sendText() { const t = inp.value.trim(); if (!t || busy) return; inp.value = ''; addMsg(t, 'user'); lock(true); try { const fd = new FormData(); fd.append('text', t); fd.append('language', lang()); const r = await fetch('/api/market-help', { method: 'POST', body: fd }); const d = await r.json(); if (d.success) { const m = addMsg(d.reply_text, 'bot'); addPlay(m, d.reply_audio) } else { addMsg('⚠️ ' + (d.error || 'Something went wrong.'), 'bot') } } catch (e) { addMsg('⚠️ Network error.', 'bot') } lock(false); inp.focus() }
        function ask(t) { inp.value = t; sendText() }
        async function toggleMic() { if (busy) return; if (recording) { stopRec(); return } try { const stream = await navigator.mediaDevices.getUserMedia({ audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true, noiseSuppression: true } }); chunks = []; recorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' }); recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data) }; recorder.onstop = async () => { stream.getTracks().forEach(t => t.stop()); if (!chunks.length) return; const blob = new Blob(chunks, { type: 'audio/wav' }); addMsg('🎤 <em>Voice message</em>', 'user'); lock(true); try { const fd = new FormData(); fd.append('audio', blob, 'rec.wav'); fd.append('language', lang()); const r = await fetch('/api/market-help', { method: 'POST', body: fd }); const d = await r.json(); if (d.success) { let pre = ''; if (d.transcript) pre = `<div class="transcript-tag">🗣️ "${d.transcript}"</div>`; const m = addMsg(d.reply_text, 'bot', pre); if (d.reply_audio) { addPlay(m, d.reply_audio); play(d.reply_audio, m.querySelector('.play-btn')) } } else { addMsg('⚠️ ' + (d.error || 'Could not process voice.'), 'bot') } } catch (e) { addMsg('⚠️ Network error.', 'bot') } lock(false) }; recorder.start(); recording = true; micBtn.classList.add('recording'); micBtn.innerHTML = '⬛'; setTimeout(() => { if (recording) stopRec() }, 7000) } catch (e) { addMsg(e.name === 'NotAllowedError' ? '⚠️ Mic permission denied.' : '⚠️ Mic not available.', 'bot') } }
        function stopRec() { if (recorder && recorder.state === 'recording') recorder.stop(); recording = false; micBtn.classList.remove('recording'); micBtn.innerHTML = '🎤' }
        inp.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText() } });
        async function logout() { try { const r = await fetch('/api/logout', { method: 'POST', headers: { 'Content-Type': 'application/json' } }); const d = await r.json(); if (d.success) window.location.href = d.redirect } catch (e) { window.location.href = '/login' } }
    </script>
